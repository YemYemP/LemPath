<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WebLemmings — a web-based tribute to the classic 1991 puzzle game" />
    <title>WebLemmings</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      /* Cursor changes based on selected skill (set dynamically via JS) */
      #game-root { image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <!-- #game-root is created and appended by main.ts -->
    <noscript>
      <p style="color:#fff;text-align:center;padding:2rem;font-family:monospace">
        WebLemmings requires JavaScript to run.
      </p>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
